name: Build and Test

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/Umbraco.Community.FormsAuditTrail.slnx

      - name: Build
        run: dotnet build src/Umbraco.Community.FormsAuditTrail.slnx --no-restore -c Release

      - name: Test
        run: dotnet test src/Umbraco.Community.FormsAuditTrail.slnx --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/results.trx'
